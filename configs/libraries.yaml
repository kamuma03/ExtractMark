    pip_packages: ["surya-ocr"]

  LIB-12:
    name: "Unstructured"
    tier: 2
    formats: ["pdf", "docx", "pptx", "html", "images"]
    gpu_required: false
    pip_packages: ["unstructured[all-docs]"]

  LIB-13:
    name: "MarkItDown"
    tier: 2
