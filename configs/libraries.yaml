  LIB-16:
    name: "Nougat"
    tier: 3
    formats: ["pdf"]
    gpu_required: true
    pip_packages: ["nougat-ocr"]

  LIB-17:
    name: "pdfminer.six"
    tier: 3
    formats: ["pdf"]
    gpu_required: false
    pip_packages: ["pdfminer.six"]
