  LIB-14:
    name: "Tesseract"
    tier: 3
    formats: ["images", "pdf"]
    gpu_required: false
    pip_packages: ["pytesseract"]

  LIB-15:
    name: "Table Transformer (TATR)"
    tier: 3
    formats: ["images"]
    gpu_required: false
