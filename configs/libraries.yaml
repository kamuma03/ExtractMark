libraries:
  # Tier 1 -- Rule-Based / Heuristic (CPU, deterministic)
  LIB-01:
    name: "PyMuPDF / pymupdf4llm"
    tier: 1
    formats: ["pdf"]
    gpu_required: false
    pip_packages: ["pymupdf", "pymupdf4llm"]

  LIB-02:
    name: "pdfplumber"
    tier: 1
    formats: ["pdf"]
    gpu_required: false
    pip_packages: ["pdfplumber"]

  LIB-03:
    name: "pypdfium2"
    tier: 1
    formats: ["pdf"]
    gpu_required: false
    pip_packages: ["pypdfium2"]

  LIB-04:
    name: "Camelot"
    tier: 1
    formats: ["pdf"]
    gpu_required: false
    pip_packages: ["camelot-py", "opencv-python"]

  LIB-05:
    name: "Tabula-py"
    tier: 1
    formats: ["pdf"]
    gpu_required: false
    pip_packages: ["tabula-py"]

  LIB-06:
    name: "python-docx"
    tier: 1
    formats: ["docx"]
    gpu_required: false
    pip_packages: ["python-docx"]

  LIB-07:
    name: "python-pptx"
    tier: 1
    formats: ["pptx"]
