  LIB-08:
    name: "Docling"
    tier: 2
    formats: ["pdf", "docx", "pptx", "html"]
    gpu_required: false
    pip_packages: ["docling"]

  LIB-09:
    name: "MinerU"
    tier: 2
    formats: ["pdf"]
